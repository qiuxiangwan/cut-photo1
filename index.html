<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频帧截图工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f23;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 28px;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* 上传区域 */
    .upload-area {
      border: 2px dashed #3a3a5c;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      margin-bottom: 30px;
      transition: all 0.3s;
      background: #1a1a2e;
    }

    .upload-area:hover {
      border-color: #00d4ff;
      background: #1a1a3e;
    }

    .upload-area input[type="file"] {
      display: none;
    }

    .upload-btn {
      display: inline-block;
      padding: 12px 32px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: transform 0.2s;
    }

    .upload-btn:hover {
      transform: translateY(-2px);
    }

    /* 控制面板 */
    .controls {
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 30px;
      padding: 20px;
      background: #1a1a2e;
      border-radius: 12px;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .control-group label {
      color: #a0a0b0;
      font-size: 14px;
    }

    .control-group input[type="number"] {
      width: 80px;
      padding: 8px 12px;
      background: #0f0f23;
      border: 1px solid #3a3a5c;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
    }

    .control-group input[type="text"] {
      width: 160px;
      padding: 8px 12px;
      background: #0f0f23;
      border: 1px solid #3a3a5c;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
    }

    .control-group select {
      padding: 8px 12px;
      background: #0f0f23;
      border: 1px solid #3a3a5c;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .btn-primary {
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      color: #000;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-success {
      background: linear-gradient(135deg, #00c853, #009624);
      color: #fff;
    }

    .btn-danger {
      background: linear-gradient(135deg, #ff5252, #d32f2f);
      color: #fff;
    }

    .btn-warning {
      background: linear-gradient(135deg, #ffa726, #f57c00);
      color: #000;
    }

    /* 视频区域 */
    .video-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    @media (max-width: 768px) {
      .video-section {
        grid-template-columns: 1fr;
      }
    }

    .video-box {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 16px;
    }

    .video-box h3 {
      margin-bottom: 12px;
      font-size: 16px;
      color: #a0a0b0;
    }

    video {
      width: 100%;
      border-radius: 8px;
      background: #000;
    }

    /* 进度条 */
    .progress-bar {
      width: 100%;
      height: 4px;
      background: #3a3a5c;
      border-radius: 2px;
      margin-top: 12px;
      overflow: hidden;
      display: none;
    }

    .progress-bar.active {
      display: block;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      border-radius: 2px;
      transition: width 0.3s;
      width: 0%;
    }

    /* 截图画廊 */
    .gallery {
      margin-top: 30px;
    }

    .gallery-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .gallery-header h2 {
      font-size: 20px;
    }

    .gallery-stats {
      color: #a0a0b0;
      font-size: 14px;
    }

    .images-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .img-card {
      background: #1a1a2e;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #2a2a4a;
      transition: transform 0.2s;
    }

    .img-card:hover {
      transform: translateY(-4px);
      border-color: #00d4ff;
    }

    .img-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
    }

    .img-info {
      padding: 12px;
    }

    .img-info .frame-num {
      font-size: 13px;
      color: #00d4ff;
      font-weight: 600;
    }

    .img-info .filename {
      font-size: 11px;
      color: #ffa726;
      margin-top: 4px;
      word-break: break-all;
    }

    .img-info .timestamp {
      font-size: 12px;
      color: #a0a0b0;
      margin-top: 4px;
    }

    .img-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .img-actions button {
      flex: 1;
      padding: 6px;
      border: 1px solid #3a3a5c;
      background: transparent;
      color: #e0e0e0;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .img-actions button:hover {
      background: #00d4ff;
      color: #000;
      border-color: #00d4ff;
    }

    /* 重命名面板 */
    .rename-panel {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid #2a2a4a;
    }

    .rename-panel h3 {
      font-size: 16px;
      margin-bottom: 16px;
      color: #a0a0b0;
    }

    .rename-options {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .rename-options .control-group {
      margin-bottom: 0;
    }

    .rename-preview {
      margin-top: 12px;
      padding: 12px;
      background: #0f0f23;
      border-radius: 8px;
      font-size: 13px;
      color: #a0a0b0;
    }

    .rename-preview span {
      color: #00d4ff;
      font-weight: 600;
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 60px;
      color: #666;
    }

    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    /* 下载全部按钮 */
    .download-all {
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* 隐藏的画布 */
    #captureCanvas {
      display: none;
    }

    /* 状态标签 */
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-badge.processing {
      background: rgba(0, 212, 255, 0.15);
      color: #00d4ff;
    }

    .status-badge.done {
      background: rgba(0, 200, 83, 0.15);
      color: #00c853;
    }
  </style>
<base target="_blank">
</head>
<body>
  <div class="container">
    <h1>🎬 视频帧截图工具</h1>

    <!-- 上传区域 -->
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept="video/*" onchange="handleFile(event)">
      <div style="font-size: 48px; margin-bottom: 16px;">📁</div>
      <div class="upload-btn">选择视频文件</div>
      <p style="margin-top: 12px; color: #666; font-size: 14px;">支持 MP4、WebM、MOV 等格式</p>
    </div>

    <!-- 控制面板 -->
    <div class="controls" id="controls" style="display: none;">
      <div class="control-group">
        <label>每 N 帧截图：</label>
        <input type="number" id="frameInterval" value="30" min="1">
      </div>
      <div class="control-group">
        <label>输出格式：</label>
        <select id="outputFormat">
          <option value="png">PNG</option>
          <option value="jpeg">JPEG</option>
        </select>
      </div>
      <button class="btn btn-primary" id="captureBtn" onclick="startCapture()">
        开始截图
      </button>
      <button class="btn btn-danger" onclick="clearAll()">
        清空
      </button>
      <span class="status-badge" id="statusBadge" style="display: none;"></span>
    </div>

    <!-- 视频区域 -->
    <div class="video-section" id="videoSection" style="display: none;">
      <div class="video-box">
        <h3>📺 原视频</h3>
        <video id="video" controls></video>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
      <div class="video-box">
        <h3>🖼️ 实时预览</h3>
        <canvas id="previewCanvas" style="display: block; width: 100%; border-radius: 8px; background: #000;"></canvas>
      </div>
    </div>

    <!-- 重命名面板 -->
    <div class="rename-panel" id="renamePanel" style="display: none;">
      <h3>🏷️ 批量重命名设置</h3>
      <div class="rename-options">
        <div class="control-group">
          <label>文件名前缀：</label>
          <input type="text" id="renamePrefix" value="frame" placeholder="例如: screenshot">
        </div>
        <div class="control-group">
          <label>起始序号：</label>
          <input type="number" id="renameStartNum" value="1" min="0">
        </div>
        <div class="control-group">
          <label>序号位数：</label>
          <input type="number" id="renameDigits" value="3" min="1" max="10">
        </div>
        <div class="control-group">
          <label>命名模式：</label>
          <select id="renamePattern">
            <option value="prefix_num">前缀 + 序号</option>
            <option value="prefix_num_time">前缀 + 序号 + 时间</option>
            <option value="num">仅序号</option>
            <option value="time_only">仅时间戳</option>
          </select>
        </div>
        <button class="btn btn-warning" onclick="applyRename()">
          ✏️ 应用重命名
        </button>
      </div>
      <div class="rename-preview" id="renamePreview">
        预览：<span id="previewText">frame_001.png</span>
      </div>
    </div>

    <!-- 截图画廊 -->
    <div class="gallery" id="gallery" style="display: none;">
      <div class="gallery-header">
        <h2>📸 截图结果</h2>
        <span class="gallery-stats" id="galleryStats"></span>
      </div>
      <div class="download-all">
        <button class="btn btn-success" onclick="downloadAll()">📦 打包下载全部</button>
        <button class="btn btn-primary" onclick="toggleRenamePanel()">🏷️ 批量重命名</button>
      </div>
      <div class="images-grid" id="imagesGrid"></div>
    </div>

    <!-- 空状态 -->
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
      <p>上传视频后，设置参数并点击"开始截图"</p>
    </div>
  </div>

  <!-- 隐藏的截图画布 -->
  <canvas id="captureCanvas"></canvas>

  <script>
    let videoUrl = '';
    let capturedImages = [];
    let isCapturing = false;

    const video = document.getElementById('video');
    const fileInput = document.getElementById('fileInput');
    const controls = document.getElementById('controls');
    const videoSection = document.getElementById('videoSection');
    const gallery = document.getElementById('gallery');
    const emptyState = document.getElementById('emptyState');
    const captureCanvas = document.getElementById('captureCanvas');
    const previewCanvas = document.getElementById('previewCanvas');
    const ctx = captureCanvas.getContext('2d');
    const previewCtx = previewCanvas.getContext('2d');
    const renamePanel = document.getElementById('renamePanel');

    // 文件选择
    function handleFile(event) {
      const file = event.target.files[0];
      if (!file) return;

      videoUrl = URL.createObjectURL(file);
      video.src = videoUrl;

      controls.style.display = 'flex';
      videoSection.style.display = 'grid';
      emptyState.style.display = 'none';
      capturedImages = [];
      renamePanel.style.display = 'none';
      updateGallery();
    }

    // 截图单帧
    function captureFrame(videoEl) {
      captureCanvas.width = videoEl.videoWidth;
      captureCanvas.height = videoEl.videoHeight;
      ctx.drawImage(videoEl, 0, 0, captureCanvas.width, captureCanvas.height);

      // 更新预览
      previewCanvas.width = videoEl.videoWidth;
      previewCanvas.height = videoEl.videoHeight;
      previewCtx.drawImage(videoEl, 0, 0, previewCanvas.width, previewCanvas.height);

      const format = document.getElementById('outputFormat').value;
      const mimeType = format === 'png' ? 'image/png' : 'image/jpeg';
      const quality = format === 'jpeg' ? 0.92 : undefined;

      return captureCanvas.toDataURL(mimeType, quality);
    }

    // 开始批量截图
    async function startCapture() {
      if (isCapturing) return;
      isCapturing = true;

      const interval = parseInt(document.getElementById('frameInterval').value) || 30;
      const fps = 30; // 默认30fps
      const captureBtn = document.getElementById('captureBtn');
      const statusBadge = document.getElementById('statusBadge');
      const progressBar = document.getElementById('progressBar');
      const progressFill = document.getElementById('progressFill');

      captureBtn.disabled = true;
      statusBadge.style.display = 'inline-block';
      statusBadge.className = 'status-badge processing';
      statusBadge.textContent = '截图中...';
      progressBar.classList.add('active');

      capturedImages = [];
      const totalFrames = Math.floor(video.duration * fps);

      // 创建离屏视频用于精准控制
      const offscreenVideo = document.createElement('video');
      offscreenVideo.src = videoUrl;
      offscreenVideo.muted = true;

      await new Promise(resolve => {
        offscreenVideo.onloadedmetadata = resolve;
      });

      for (let i = 0; i < totalFrames; i += interval) {
        const time = i / fps;
        offscreenVideo.currentTime = time;

        await new Promise(resolve => {
          offscreenVideo.onseeked = resolve;
        });

        const dataUrl = captureFrame(offscreenVideo);

        capturedImages.push({
          dataUrl: dataUrl,
          frame: i,
          time: time,
          filename: `frame_${String(i).padStart(6, '0')}.png`
        });

        // 更新进度
        const progress = ((i + interval) / totalFrames) * 100;
        progressFill.style.width = Math.min(progress, 100) + '%';

        // 实时更新画廊
        updateGallery();
      }

      offscreenVideo.remove();

      statusBadge.className = 'status-badge done';
      statusBadge.textContent = `完成！共 ${capturedImages.length} 张`;
      captureBtn.disabled = false;
      isCapturing = false;

      setTimeout(() => {
        progressBar.classList.remove('active');
        progressFill.style.width = '0%';
      }, 1000);
    }

    // 生成文件名
    function generateFilename(prefix, num, time, pattern, digits, format) {
      const ext = format === 'jpeg' ? 'jpg' : 'png';
      const paddedNum = String(num).padStart(digits, '0');
      const timeStr = time.toFixed(2).replace('.', '_');

      switch (pattern) {
        case 'prefix_num_time':
          return `${prefix}_${paddedNum}_${timeStr}s.${ext}`;
        case 'time_only':
          return `${timeStr}s.${ext}`;
        case 'num':
            return `${paddedNum}.${ext}`;
        case 'prefix_num':
        default:
          return `${prefix}_${paddedNum}.${ext}`;
      }
    }

    // 更新重命名预览
    function updateRenamePreview() {
      const prefix = document.getElementById('renamePrefix').value || 'frame';
      const startNum = parseInt(document.getElementById('renameStartNum').value) || 1;
      const digits = parseInt(document.getElementById('renameDigits').value) || 3;
      const pattern = document.getElementById('renamePattern').value;
      const format = document.getElementById('outputFormat').value;

      const preview = generateFilename(prefix, startNum, 1.23, pattern, digits, format);
      document.getElementById('previewText').textContent = preview;
    }

    // 监听重命名输入变化
    ['renamePrefix', 'renameStartNum', 'renameDigits', 'renamePattern', 'outputFormat'].forEach(id => {
      const el = document.getElementById(id);
      if (el) {
        el.addEventListener('input', updateRenamePreview);
        el.addEventListener('change', updateRenamePreview);
      }
    });

    // 切换重命名面板
    function toggleRenamePanel() {
      renamePanel.style.display = renamePanel.style.display === 'none' ? 'block' : 'none';
      if (renamePanel.style.display === 'block') {
        updateRenamePreview();
      }
    }

    // 应用重命名
    function applyRename() {
      if (capturedImages.length === 0) return;

      const prefix = document.getElementById('renamePrefix').value || 'frame';
      const startNum = parseInt(document.getElementById('renameStartNum').value) || 1;
      const digits = parseInt(document.getElementById('renameDigits').value) || 3;
      const pattern = document.getElementById('renamePattern').value;
      const format = document.getElementById('outputFormat').value;

      capturedImages.forEach((img, index) => {
        img.filename = generateFilename(prefix, startNum + index, img.time, pattern, digits, format);
      });

      updateGallery();

      // 显示成功提示
      const statusBadge = document.getElementById('statusBadge');
      statusBadge.style.display = 'inline-block';
      statusBadge.className = 'status-badge done';
      statusBadge.textContent = `已重命名 ${capturedImages.length} 张图片`;

      setTimeout(() => {
        statusBadge.style.display = 'none';
      }, 3000);
    }

    // 更新画廊显示
    function updateGallery() {
      const grid = document.getElementById('imagesGrid');
      const stats = document.getElementById('galleryStats');

      if (capturedImages.length === 0) {
        gallery.style.display = 'none';
        return;
      }

      gallery.style.display = 'block';
      stats.textContent = `共 ${capturedImages.length} 张截图`;

      grid.innerHTML = capturedImages.map((img, index) => `
        <div class="img-card">
          <img src="${img.dataUrl}" alt="Frame ${img.frame}">
          <div class="img-info">
            <div class="frame-num">第 ${img.frame} 帧</div>
            <div class="filename">${img.filename}</div>
            <div class="timestamp">时间: ${img.time.toFixed(2)}s</div>
            <div class="img-actions">
              <button onclick="downloadImage(${index})">⬇️ 下载</button>
              <button onclick="deleteImage(${index})">🗑️ 删除</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // 下载单张
    function downloadImage(index) {
      const img = capturedImages[index];
      const link = document.createElement('a');
      link.download = img.filename;
      link.href = img.dataUrl;
      link.click();
    }

    // 删除单张
    function deleteImage(index) {
      capturedImages.splice(index, 1);
      updateGallery();
      if (capturedImages.length === 0) {
        document.getElementById('statusBadge').style.display = 'none';
        renamePanel.style.display = 'none';
      }
    }

    // 下载全部（逐个触发下载）
    function downloadAll() {
      capturedImages.forEach((img, i) => {
        setTimeout(() => {
          const link = document.createElement('a');
          link.download = img.filename;
          link.href = img.dataUrl;
          link.click();
        }, i * 200); // 间隔200ms避免浏览器拦截
      });
    }

    // 清空
    function clearAll() {
      video.src = '';
      videoUrl = '';
      capturedImages = [];
      fileInput.value = '';
      controls.style.display = 'none';
      videoSection.style.display = 'none';
      gallery.style.display = 'none';
      renamePanel.style.display = 'none';
      emptyState.style.display = 'block';
      document.getElementById('statusBadge').style.display = 'none';
      previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
    }
  </script>
</body>
</html>
